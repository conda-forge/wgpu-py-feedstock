{% set python_min = "3.11" %}
{% set version = "0.32.0" %}

package:
  name: wgpu-py
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/w/wgpu/wgpu-{{ version }}.tar.gz
  sha256: cb23b2f225594258ccc8ba97458381e46c18e561c5d2d6fc25213e68a6d89985

build:
  noarch: python
  script_env:
    # Avoid pulling in any binary files during the hatchling building process
    # https://github.com/pygfx/wgpu-py/pull/669
    - WGPU_PY_BUILD_NOARCH=1
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - pip
    - hatchling
  run:
    - python >={{ python_min }}
    - cffi >=1.15.0
    - rubicon-objc >=0.4.1  # [osx]
    # https://github.com/pygfx/wgpu-py/blob/main/wgpu/backends/wgpu_native/__init__.py
    - wgpu-native 29.0.1.1
    # Check the pypi package requirement
    # to keep render canvas in sync
    # https://github.com/pygfx/wgpu-py/blob/main/pyproject.toml
    - rendercanvas >=2.7
    - __linux  # [linux]
    - __win    # [win]
    - __osx    # [osx]

test:
  imports:
    - wgpu
    - wgpu.backends.wgpu_native
  requires:
    - pip
    - python {{ python_min }}
  commands:
    - pip check

about:
  home: https://github.com/pygfx/wgpu-py
  summary: next generation GPU API for Python
  license: BSD-2-Clause
  license_file: LICENSE

extra:
  recipe-maintainers:
    - hmaarrfk
